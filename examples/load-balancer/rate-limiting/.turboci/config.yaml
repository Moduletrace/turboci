# yaml-language-server: $schema=../../../../schema/turboci.schema.json

deployments:
    - deployment_name: rate_limited_lb
      provider: hetzner
      location: ash
      description: >
          Load balancer with custom NGINX location blocks. The /api/auth/
          path is rate limited to 5 req/s (burst 10, no delay), and
          /static/ is served directly from disk without proxying upstream.
          All other traffic hits the default proxy location.
      services:
          api:
              instances: 1
              clusters: 1
              server_type: cpx21
              dependencies:
                  turboci:
                      - bun
              dir_mappings:
                  - src: ./server
                    dst: /app/server
              run:
                  preflight:
                      file: /app/server/setup.sh
                  start:
                      work_dir: /app
                      cmds:
                          - bun run start
          lb:
              type: load_balancer
              ssl:
                  email: ops@example.com
              target_services:
                  - service_name: api
                    port: 3000
                    domains:
                        - app.example.com
                    locations:
                        # Rate-limit login/auth to prevent brute force
                        - path: /api/auth/
                          rate_limit:
                              rate: "5r/s"
                              burst: 10
                              nodelay: true

                        # Serve static assets directly from disk, skip upstream
                        - path: /static/
                          proxy: false
                          directives:
                              root: /var/www/html
                              expires: "30d"
                              add_header:
                                  - "Cache-Control 'public'"
                                  - "X-Content-Type-Options 'nosniff'"
