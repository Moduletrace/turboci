# yaml-language-server: $schema=../../../../schema/turboci.schema.json

deployments:
    - deployment_name: rate_limited_lb
      provider: hetzner
      location: ash
      description: >
          Load balancer with custom NGINX location blocks. The /api/auth/
          path is rate limited to 5 req/s (burst 10, no delay), and
          /static/ is served directly from disk without proxying upstream.
          All other traffic hits the default proxy location.
      services:
          api:
              instances: 1
              clusters: 1
              server_type: cpx11
              dependencies:
                  turboci:
                      - bun
                      - node
              dir_mappings:
                  - dst: /app/server
                    src: ./server
              run:
                  preflight:
                      cmds:
                          - bun add -g pm2
                          - pm2 kill
                          - cd /app
                          - chmod +x ./server/setup.sh && ./server/setup.sh
                          - ls -laF
                  start:
                      work_dir: /app
                      cmds:
                          - pm2 start "bun server/server.ts"
              healthcheck:
                  cmd: curl http://localhost:3000/healthcheck
                  test: Welcome to Bun JS
              logs:
                  - pm2 logs
          lb:
              type: load_balancer
              target_services:
                  - service_name: api
                    port: 3000
                    locations:
                        # Rate-limit login/auth to prevent brute force
                        - match: /api/auth/
                          rate_limit:
                              rate: "5r/s"
                              burst: 10
                              nodelay: true

                        # Serve static assets directly from disk, skip upstream
                        - match: /static/
                          no_proxy: true
                          directives:
                              root: /var/www/html
                              expires: "30d"
                              add_header:
                                  - "Cache-Control 'public'"
                                  - "X-Content-Type-Options 'nosniff'"
