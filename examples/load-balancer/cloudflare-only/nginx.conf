# This is the output from the provided
# TurboCI config.yaml file

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
        worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    gzip on;

    upstream turboci_load_balancer_upstream_api_3000 {
        server 10.4.0.3:3000 max_fails=1 fail_timeout=5s;
    }

    server {
        listen 80;
        server_name turboci-cloudflare-test.tben.me;
        return 301 https://\$host\$request_uri;
    }
    server {
        listen 443 ssl;
        server_name turboci-cloudflare-test.tben.me;
        ssl_certificate     /etc/letsencrypt/live/api/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api/privkey.pem;

        location /.well-known/acme-challenge/ {
            proxy_pass http://127.0.0.1:8888;
        }

        location / {
            allow 173.245.48.0/20;
            allow 103.21.244.0/22;
            allow 103.22.200.0/22;
            allow 103.31.4.0/22;
            allow 141.101.64.0/18;
            allow 108.162.192.0/18;
            allow 190.93.240.0/20;
            allow 188.114.96.0/20;
            allow 197.234.240.0/22;
            allow 198.41.128.0/17;
            allow 162.158.0.0/15;
            allow 104.16.0.0/13;
            allow 104.24.0.0/14;
            allow 172.64.0.0/13;
            allow 131.0.72.0/22;
            allow 2400:cb00::/32;
            allow 2606:4700::/32;
            allow 2803:f800::/32;
            allow 2405:b500::/32;
            allow 2405:8100::/32;
            allow 2a06:98c0::/29;
            allow 2c0f:f248::/32;
            deny all;

            proxy_pass http://turboci_load_balancer_upstream_api_3000;
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade \$http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout       3s;
            proxy_send_timeout          60s;
            proxy_read_timeout          60s;
            send_timeout                60s;
            proxy_next_upstream http_500 http_502 http_503 http_504 error timeout invalid_header;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;


        }

    }
}