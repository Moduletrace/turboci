# yaml-language-server: $schema=../../../schema/turboci.schema.json

deployments:
    - deployment_name: postgres_haproxy
      provider: hetzner
      location: ash
      description: >
          PostgreSQL with streaming replication (1 primary + 2 hot standbys)
          fronted by HAProxy. HAProxy uses the native pgsql health check to
          verify each backend before routing connections.

          HAProxy is a generic TCP/HTTP proxy that works with any backend
          (PostgreSQL, MySQL, MariaDB, Redis, etc.). For PostgreSQL specifically
          it is the recommended proxy since neither MaxScale nor ProxySQL
          support the PostgreSQL protocol.
      services:
          db:
              type: postgres
              instances: 3
              clusters: 1
              postgres:
                  port: 5432
                  root_password: "${PG_PASSWORD}"
                  listen_addresses: "*"
                  max_connections: 200
                  shared_buffers: 512MB
                  databases:
                      - name: myapp
                        user: myapp_user
                        password: "${PG_APP_PASSWORD}"
                  replication:
                      enabled: true
                      user: replicator
                      password: "${PG_REPL_PASSWORD}"
                      max_wal_senders: 5
              # TurboCI installs PostgreSQL, configures postgresql.conf and
              # pg_hba.conf, and generates /usr/local/bin/tci-postgres-start.sh.
              # That script starts the primary, creates users/databases, and
              # runs pg_basebackup + standby startup on all other nodes.
              run:
                  start:
                      cmds:
                          - /usr/local/bin/tci-postgres-start.sh
              #   healthcheck:
              #       cmd: pg_isready -U postgres
              #       test: "accepting connections"
              logs:
                  - journalctl -fu postgresql

          proxy:
              type: haproxy
              instances: 1
              clusters: 1
              server_type: cpx11
              haproxy:
                  target_services:
                      - service_name: db
                        port: 5432
                        check:
                            type: pgsql
                            interval: 2s
                            rise: 2
                            fall: 3
                  listen_port: 5432
                  mode: tcp
                  balance: leastconn
                  timeout_connect: 5s
                  timeout_client: 30s
                  timeout_server: 30s
                  stats_port: 8404
                  stats_user: admin
                  stats_password: "${HAPROXY_STATS_PASSWORD}"
              # No run scripts needed — TurboCI installs HAProxy, writes
              # /etc/haproxy/haproxy.cfg with the discovered backend IPs,
              # validates the config, and starts the service during prepare.
              healthcheck:
                  cmd: haproxy -c -f /etc/haproxy/haproxy.cfg
                  test: "Configuration file is valid"
              logs:
                  - journalctl -fu haproxy

      env:
          PG_PASSWORD: "changeme"
          PG_APP_PASSWORD: "changeme"
          PG_REPL_PASSWORD: "changeme"
          HAPROXY_STATS_PASSWORD: "changeme"
