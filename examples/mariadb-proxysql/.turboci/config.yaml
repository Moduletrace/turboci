# yaml-language-server: $schema=../../../schema/turboci.schema.json

deployments:
    - deployment_name: mariadb_galera_proxysql
      provider: hetzner
      location: ash
      description: >
          MariaDB Galera multi-primary cluster (3 nodes) fronted by proxysql.
      services:
          db:
              type: mariadb-galera
              instances: 3
              clusters: 1
              mariadb_galera:
                  cluster_name: turboci_galera
                  sst_method: mariabackup
                  root_password: "${DB_ROOT_PASSWORD}"
                  port: 3306
                  bind_address: "0.0.0.0"
                  databases:
                      - name: myapp
                        user: myapp_user
                        password: "${DB_APP_PASSWORD}"
                        charset: utf8mb4
                        collation: utf8mb4_unicode_ci
              # TurboCI installs MariaDB + Galera, writes galera.cnf with all node
              # IPs, and generates /usr/local/bin/tci-galera-start.sh.
              # That script bootstraps the first node and joins the rest.
              run:
                  start:
                      cmds:
                          - /usr/local/bin/tci-galera-start.sh
                  postflight:
                      cmds:
                          # Runs CREATE DATABASE / CREATE USER on the bootstrap node only
                          - /usr/local/bin/tci-galera-init.sh
              healthcheck:
                  cmd: mysql -u root -p"${DB_ROOT_PASSWORD}" -e "SHOW STATUS LIKE 'wsrep_cluster_size';"
                  test: "3"
              logs:
                  - journalctl -fu mariadb

          proxy:
              type: proxysql
              instances: 1
              clusters: 1
              server_type: cpx11
              proxysql:
                  target_services:
                      - service_name: db
                        port: 3306
                        hostgroup: 10
                        max_connections: 200
                      - service_name: db
                        port: 3306
                        hostgroup: 20
                        max_connections: 200
                  listen_port: 6033
                  admin_port: 6032
                  admin_user: admin
                  admin_password: "${PROXYSQL_ADMIN_PASSWORD}"
                  monitor_user: proxysql_monitor
                  monitor_password: "${PROXYSQL_MONITOR_PASSWORD}"
                  writer_hostgroup: 10
                  reader_hostgroup: 20
                  query_rules:
                      - rule_id: 1
                        match_digest: "^SELECT .* FOR UPDATE"
                        destination_hostgroup: 10
                        apply: true
                        comment: "SELECT FOR UPDATE must go to writer"
                      - rule_id: 2
                        match_digest: "^SELECT"
                        destination_hostgroup: 20
                        apply: true
                        comment: "All SELECTs go to reader hostgroup"
              # No run scripts needed — TurboCI installs ProxySQL, writes
              # /etc/proxysql.cnf with backend IPs and query rules, removes
              # the stale SQLite database so the config is re-read, and
              # starts the service during prepare.
              healthcheck:
                  cmd: mysql -u admin -p"${PROXYSQL_ADMIN_PASSWORD}" -h 127.0.0.1 -P 6032 -e "SELECT hostgroup_id, hostname, status FROM runtime_mysql_servers LIMIT 1;"
                  test: "ONLINE"
              logs:
                  - journalctl -fu proxysql

      env:
          MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
          MYSQL_APP_PASSWORD: "${MYSQL_APP_PASSWORD}"
          MYSQL_REPL_PASSWORD: "${MYSQL_REPL_PASSWORD}"
          PROXYSQL_ADMIN_PASSWORD: "${PROXYSQL_ADMIN_PASSWORD}"
          PROXYSQL_MONITOR_PASSWORD: "${PROXYSQL_MONITOR_PASSWORD}"
