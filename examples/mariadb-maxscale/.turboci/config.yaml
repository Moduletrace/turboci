# yaml-language-server: $schema=../../../schema/turboci.schema.json

deployments:
    - deployment_name: mariadb_galera_maxscale
      provider: hetzner
      location: ash
      description: >
          MariaDB Galera multi-primary cluster (3 nodes) fronted by MaxScale.
          MaxScale uses galeramon to monitor cluster health and readwritesplit
          to route writes to the primary while distributing reads across all nodes.

          MaxScale supports MariaDB (all versions), MariaDB Galera, and MySQL 5.5+.
          It does NOT support PostgreSQL — use HAProxy for that.
      services:
          db:
              type: mariadb-galera
              instances: 3
              clusters: 1
              server_type: cpx21
              mariadb_galera:
                  cluster_name: turboci_galera
                  sst_method: mariabackup
                  root_password: "${DB_ROOT_PASSWORD}"
                  port: 3306
                  bind_address: "0.0.0.0"
                  databases:
                      - name: myapp
                        user: myapp_user
                        password: "${DB_APP_PASSWORD}"
                        charset: utf8mb4
                        collation: utf8mb4_unicode_ci
              # TurboCI installs MariaDB + Galera, writes galera.cnf with all node
              # IPs, and generates /usr/local/bin/tci-galera-start.sh.
              # That script bootstraps the first node and joins the rest.
              run:
                  start:
                      cmds:
                          - /usr/local/bin/tci-galera-start.sh
                  postflight:
                      cmds:
                          # Runs CREATE DATABASE / CREATE USER on the bootstrap node only
                          - /usr/local/bin/tci-galera-init.sh
              healthcheck:
                  cmd: mysql -u root -p"${DB_ROOT_PASSWORD}" -e "SHOW STATUS LIKE 'wsrep_cluster_size';"
                  test: "3"
              logs:
                  - journalctl -fu mariadb

          maxscale:
              type: maxscale
              instances: 1
              clusters: 1
              server_type: cpx11
              maxscale:
                  target_services:
                      - service_name: db
                        port: 3306
                  listen_port: 3306
                  router: readwritesplit
                  monitor: galeramon
                  admin_port: 8989
                  admin_user: admin
                  admin_password: "${MAXSCALE_ADMIN_PASSWORD}"
                  user: maxscale_monitor
                  password: "${MAXSCALE_MONITOR_PASSWORD}"
              # No run scripts needed — TurboCI installs MaxScale, writes
              # /etc/maxscale.cnf with the discovered backend IPs, and starts
              # the service during the prepare phase.
              #   healthcheck:
              #       cmd: maxctrl list servers
              #       test: "Master"
              logs:
                  - journalctl -fu maxscale

      env:
          DB_ROOT_PASSWORD: "changeme"
          DB_APP_PASSWORD: "changeme"
          MAXSCALE_ADMIN_PASSWORD: "changeme"
          MAXSCALE_MONITOR_PASSWORD: "changeme"
